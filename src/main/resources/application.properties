# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── H2 (development) ──────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:briefingdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Briefing General ──────────────────────────────────────────────────────────
briefing.max-items-per-brief=5

# ── AI Summarizer (OpenAI-compatible) ─────────────────────────────────────────
# Set briefing.ai.enabled=true and provide your API key to activate real AI summaries.
# Supports OpenAI, Azure OpenAI, Groq, Ollama (local), or any OpenAI-compatible endpoint.
briefing.ai.enabled=false
briefing.ai.api-url=https://api.openai.com/v1/chat/completions
briefing.ai.api-key=YOUR_OPENAI_API_KEY_HERE
briefing.ai.model=gpt-4o-mini

# ── News Fetcher (https://newsapi.org — free tier available) ──────────────────
# Set briefing.news.enabled=true and add your key to fetch real live news.
# When disabled, realistic mock articles are used (great for local dev/testing).
briefing.news.enabled=false
briefing.news.api-key=YOUR_NEWSAPI_KEY_HERE
